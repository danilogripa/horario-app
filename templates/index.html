<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador de Horários</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 24px 32px;
            background: #f0f2f5;
            color: #333;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 20px;
            color: #222;
            letter-spacing: 0.3px;
        }

        /* ── SEÇÕES DE HORÁRIO ───────────────────────────────── */
        .schedule-section {
            margin-bottom: 44px;
        }
        .schedule-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #2c3e50;
            margin: 0 0 14px;
            padding-bottom: 6px;
            border-bottom: 2px solid #d0d4da;
        }

        /* ── LEGENDA ─────────────────────────────────────────── */
        .legenda {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            font-size: 0.85rem;
            align-items: center;
        }
        .legenda-item {
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .legenda-cor {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: 1px solid rgba(0,0,0,.15);
            flex-shrink: 0;
        }
        .legenda-cor.azul   { background: #4a90d9; }
        .legenda-cor.verde  { background: #3dae6a; }
        .legenda-cor.vazio  { background: #fff; }

        /* ── TABELA ──────────────────────────────────────────── */
        .table-wrap { overflow-x: auto; }

        table {
            border-collapse: collapse;
            min-width: 700px;
            width: 100%;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
        }

        thead th {
            background: #2c3e50;
            color: #fff;
            padding: 12px 10px;
            font-size: 0.88rem;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
        }
        thead th:first-child {
            background: #1a252f;
            min-width: 130px;
        }

        tbody tr:not(:last-child) td {
            border-bottom: 1px solid #e8eaed;
        }

        td {
            border-right: 1px solid #e8eaed;
            text-align: center;
            vertical-align: middle;
            padding: 0;
        }
        td:last-child { border-right: none; }

        /* Coluna de horário */
        .col-horario {
            background: #f7f8fa;
            padding: 10px 14px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #555;
            text-align: left;
            white-space: nowrap;
        }
        .col-horario .htpc-badge {
            display: inline-block;
            background: #f0a500;
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 5px;
            vertical-align: middle;
            letter-spacing: .4px;
        }
        .col-horario .opt-badge {
            display: block;
            font-size: 0.68rem;
            color: #999;
            font-weight: 400;
            margin-top: 2px;
        }

        /* Células com select */
        .cell {
            height: 64px;
            padding: 4px;
        }
        .cell select {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            outline: none;
            padding: 4px 2px;
            background: #fff;
            color: #aaa;
            transition: background 0.15s;
        }
        .cell select.role-ori {
            background: #d6eaff;
            color: #1a5fa8;
        }
        .cell select.role-prof {
            background: #d4f0e0;
            color: #1a7a45;
        }

        /* Célula desabilitada (HTPC – Sexta) */
        .cell-disabled {
            height: 64px;
            background: #f2f2f2;
            cursor: not-allowed;
        }
        .cell-disabled span {
            font-size: 0.72rem;
            color: #c0c0c0;
        }

        /* ── CARDS DE HORAS ──────────────────────────────────── */
        .cards {
            display: flex;
            gap: 16px;
            margin-top: 22px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 200px;
            max-width: 360px;
            background: #fff;
            border-radius: 10px;
            padding: 16px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
        }
        .card-title {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .6px;
            margin-bottom: 6px;
        }
        .card.azul .card-title { color: #1a5fa8; }

        .card-horas {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 2px;
        }
        .card.azul .card-horas { color: #1a5fa8; }

        .card-meta {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 10px;
        }

        .bar-bg {
            height: 8px;
            background: #eee;
            border-radius: 99px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 99px;
            transition: width .35s ease;
        }
        .card.azul .bar-fill { background: #4a90d9; }

        .card-status {
            font-size: 0.75rem;
            margin-top: 6px;
            font-weight: 600;
        }
        .ok        { color: #1a7a45; }
        .falta     { color: #c0392b; }
        .excedente { color: #e67e00; }

        .card-excedente {
            font-size: 0.75rem;
            margin-top: 4px;
            font-weight: 600;
            color: #e67e00;
        }

        /* ── CONFIGURAÇÃO DE TURNOS ──────────────────────────── */
        .config-turnos {
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
            background: #fff;
            border-radius: 10px;
            padding: 14px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
            margin-bottom: 18px;
            font-size: 0.85rem;
        }
        .config-turnos label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #444;
        }
        .config-turnos input[type=time] {
            border: 1px solid #d0d4da;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 0.85rem;
            color: #333;
            outline: none;
            cursor: pointer;
        }
        .config-turnos input[type=time]:focus {
            border-color: #4a90d9;
        }
    </style>
</head>
<body>

<h1>Organizador de Horários</h1>

<!-- Legenda (compartilhada) -->
<div class="legenda">
    <div class="legenda-item">
        <div class="legenda-cor azul"></div>
        <span>Orientadora Educacional</span>
    </div>
    <div class="legenda-item">
        <div class="legenda-cor verde"></div>
        <span>Professora</span>
    </div>
    <div class="legenda-item">
        <div class="legenda-cor vazio"></div>
        <span>Não atribuído</span>
    </div>
</div>

<!-- ══ HORÁRIO 1 ══════════════════════════════════════════════ -->
<div class="schedule-section">
    <h2 class="schedule-title">Horário 1</h2>

    <div class="config-turnos">
        <label>Término da manhã: <input type="time" id="s1-fim-manha"    value="11:30" step="300"></label>
        <label>Início da tarde:  <input type="time" id="s1-inicio-tarde" value="12:30" step="300"></label>
        <label>Saída da tarde:   <input type="time" id="s1-fim-tarde"    value="17:00" step="300"></label>
    </div>

    <div class="table-wrap">
        <table>
            <thead><tr id="s1-header-row"></tr></thead>
            <tbody id="s1-tbody"></tbody>
        </table>
    </div>

    <div class="cards">
        <div class="card azul">
            <div class="card-title">Orientadora Educacional</div>
            <div class="card-horas" id="s1-h-ori">0:00</div>
            <div class="card-meta">Meta: 20:00 h/semana</div>
            <div class="bar-bg"><div class="bar-fill" id="s1-bar-ori" style="width:0%"></div></div>
            <div class="card-status"    id="s1-status-ori"></div>
            <div class="card-excedente" id="s1-excedente-ori"></div>
        </div>
    </div>
</div>

<!-- ══ HORÁRIO 2 ══════════════════════════════════════════════ -->
<div class="schedule-section">
    <h2 class="schedule-title">Horário 2</h2>

    <div class="config-turnos">
        <label>Término da manhã: <input type="time" id="s2-fim-manha"    value="11:30" step="300"></label>
        <label>Início da tarde:  <input type="time" id="s2-inicio-tarde" value="12:30" step="300"></label>
        <label>Saída da tarde:   <input type="time" id="s2-fim-tarde"    value="17:00" step="300"></label>
    </div>

    <div class="table-wrap">
        <table>
            <thead><tr id="s2-header-row"></tr></thead>
            <tbody id="s2-tbody"></tbody>
        </table>
    </div>

    <div class="cards">
        <div class="card azul">
            <div class="card-title">Orientadora Educacional</div>
            <div class="card-horas" id="s2-h-ori">0:00</div>
            <div class="card-meta">Meta: 20:00 h/semana</div>
            <div class="bar-bg"><div class="bar-fill" id="s2-bar-ori" style="width:0%"></div></div>
            <div class="card-status"    id="s2-status-ori"></div>
            <div class="card-excedente" id="s2-excedente-ori"></div>
        </div>
    </div>
</div>

<script>
const DAYS    = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta'];
const META_ORI = 20.0;

const OPTIONS = [
    { label: '—',              role: null   },
    { label: 'Juventino',      role: 'prof' },
    { label: 'HTPC',           role: 'prof' },
    { label: 'Planej Casa',    role: 'prof' },
    { label: 'JUVENTINO',      role: 'ori'  },
    { label: 'ELEA TATAGIBA',  role: 'ori'  },
    { label: 'CHRISTOS',       role: 'ori'  },
    { label: 'ANNA BENEDICTA', role: 'ori'  },
    { label: 'SEMED',          role: 'ori'  },
];

function timeToHours(hhmm) {
    const [h, m] = hhmm.split(':').map(Number);
    return h + m / 60;
}

function toHM(h) {
    const hrs  = Math.floor(h);
    const mins = Math.round((h - hrs) * 60);
    return `${hrs}:${String(mins).padStart(2, '0')}`;
}

function createSchedule(n) {
    const p = `s${n}`;
    let state = {};
    let slots  = [];

    function g(suffix) { return document.getElementById(`${p}-${suffix}`); }
    function key(s, d)  { return `${s}-${d}`; }

    function buildSlots() {
        const fimManha    = g('fim-manha').value    || '11:30';
        const inicioTarde = g('inicio-tarde').value || '12:30';
        const fimTarde    = g('fim-tarde').value    || '17:00';
        slots = [
            {
                label: `07:30 – ${fimManha}`,
                hours: Math.max(0, timeToHours(fimManha) - 7.5),
                htpc:  false,
            },
            {
                label: `${inicioTarde} – ${fimTarde}`,
                hours: Math.max(0, timeToHours(fimTarde) - timeToHours(inicioTarde)),
                htpc:  false,
            },
            { label: '17:00 – 19:30', hours: 2.5, htpc: true },
        ];
    }

    function isDisabled(si, di) {
        return slots[si].htpc && di === 4;
    }

    function applySelectStyle(sel) {
        const opt  = OPTIONS.find(o => o.label === sel.value);
        sel.className = opt && opt.role ? `role-${opt.role}` : '';
    }

    function renderCell(si, di) {
        const sel = document.getElementById(`${p}-sel-${si}-${di}`);
        if (!sel) return;
        sel.value = state[key(si, di)] || '';
        applySelectStyle(sel);
    }

    function updateCards() {
        let ori = 0;
        slots.forEach((slot, si) => {
            DAYS.forEach((_, di) => {
                if (isDisabled(si, di)) return;
                const opt = OPTIONS.find(o => o.label === (state[key(si, di)] || ''));
                if (opt && opt.role === 'ori') ori += slot.hours;
            });
        });

        g('h-ori').textContent   = toHM(ori);
        g('bar-ori').style.width = Math.min(ori / META_ORI * 100, 100) + '%';
        const st = g('status-ori');
        const ex = g('excedente-ori');
        if (ori >= META_ORI) {
            st.textContent = '✔ Meta atingida';
            st.className   = 'card-status ok';
            const e = ori - META_ORI;
            ex.textContent = e > 0 ? `⚠ Excedente: ${toHM(e)}` : '';
        } else {
            st.textContent = `Faltam ${toHM(META_ORI - ori)}`;
            st.className   = 'card-status falta';
            ex.textContent = '';
        }
    }

    function buildTable() {
        const hr = g('header-row');
        hr.innerHTML = '<th>Horário</th>';
        DAYS.forEach(d => {
            const th = document.createElement('th');
            th.textContent = d;
            hr.appendChild(th);
        });

        const tbody = g('tbody');
        tbody.innerHTML = '';
        slots.forEach((slot, si) => {
            const tr = document.createElement('tr');

            const tdLabel = document.createElement('td');
            tdLabel.className = 'col-horario';
            let inner = slot.label;
            if (slot.htpc) {
                inner += ' <span class="htpc-badge">HTPC</span>';
                inner += '<span class="opt-badge">Opcional · Seg – Qui</span>';
            }
            tdLabel.innerHTML = inner;
            tr.appendChild(tdLabel);

            DAYS.forEach((_, di) => {
                const td = document.createElement('td');
                if (isDisabled(si, di)) {
                    td.className = 'cell-disabled';
                    td.innerHTML = '<span>—</span>';
                } else {
                    td.className = 'cell';

                    const sel = document.createElement('select');
                    sel.id = `${p}-sel-${si}-${di}`;

                    const optEmpty = document.createElement('option');
                    optEmpty.value = '';
                    optEmpty.textContent = '—';
                    sel.appendChild(optEmpty);

                    const grpProf = document.createElement('optgroup');
                    grpProf.label = 'Professora';
                    OPTIONS.filter(o => o.role === 'prof').forEach(o => {
                        const opt = document.createElement('option');
                        opt.value = o.label;
                        opt.textContent = o.label;
                        grpProf.appendChild(opt);
                    });
                    sel.appendChild(grpProf);

                    const grpOri = document.createElement('optgroup');
                    grpOri.label = 'Orientadora';
                    OPTIONS.filter(o => o.role === 'ori').forEach(o => {
                        const opt = document.createElement('option');
                        opt.value = o.label;
                        opt.textContent = o.label;
                        grpOri.appendChild(opt);
                    });
                    sel.appendChild(grpOri);

                    sel.addEventListener('change', () => {
                        state[key(si, di)] = sel.value;
                        applySelectStyle(sel);
                        updateCards();
                        saveAll();
                    });

                    td.appendChild(sel);
                }
                tr.appendChild(td);
            });

            tbody.appendChild(tr);
        });
    }

    function refreshAll() {
        buildSlots();
        buildTable();
        slots.forEach((_, si) => DAYS.forEach((_, di) => {
            if (!isDisabled(si, di)) renderCell(si, di);
        }));
        updateCards();
        saveAll();
    }

    ['fim-manha', 'inicio-tarde', 'fim-tarde'].forEach(id =>
        g(id).addEventListener('change', refreshAll)
    );

    // Initial build so DOM exists before loadAll()
    buildSlots();
    buildTable();

    return {
        init(saved) {
            state = saved || {};
            if (state.__fimManha)    g('fim-manha').value    = state.__fimManha;
            if (state.__inicioTarde) g('inicio-tarde').value = state.__inicioTarde;
            if (state.__fimTarde)    g('fim-tarde').value    = state.__fimTarde;
            buildSlots();
            buildTable();
            slots.forEach((_, si) => DAYS.forEach((_, di) => {
                if (!isDisabled(si, di)) renderCell(si, di);
            }));
            updateCards();
        },
        getState() {
            return Object.assign({}, state, {
                __fimManha:    g('fim-manha').value,
                __inicioTarde: g('inicio-tarde').value,
                __fimTarde:    g('fim-tarde').value,
            });
        },
    };
}

const sch1 = createSchedule(1);
const sch2 = createSchedule(2);

function saveAll() {
    fetch('/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ s1: sch1.getState(), s2: sch2.getState() }),
    });
}

async function loadAll() {
    try {
        const res  = await fetch('/load');
        if (!res.ok) return;
        const data = await res.json();
        sch1.init(data.s1 || {});
        sch2.init(data.s2 || {});
    } catch(e) {}
}

loadAll();
</script>
</body>
</html>
