<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador de Horários</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 24px 32px;
            background: #f0f2f5;
            color: #333;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 20px;
            color: #222;
            letter-spacing: 0.3px;
        }

        /* ── LEGENDA ─────────────────────────────────────────── */
        .legenda {
            display: flex;
            gap: 20px;
            margin-bottom: 18px;
            font-size: 0.85rem;
            align-items: center;
        }
        .legenda-item {
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .legenda-cor {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: 1px solid rgba(0,0,0,.15);
            flex-shrink: 0;
        }
        .legenda-cor.azul   { background: #4a90d9; }
        .legenda-cor.verde  { background: #3dae6a; }
        .legenda-cor.vazio  { background: #fff; }
        .legenda-info {
            font-size: 0.78rem;
            color: #777;
            margin-left: 12px;
        }

        /* ── TABELA ──────────────────────────────────────────── */
        .table-wrap { overflow-x: auto; }

        table {
            border-collapse: collapse;
            min-width: 700px;
            width: 100%;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
        }

        thead th {
            background: #2c3e50;
            color: #fff;
            padding: 12px 10px;
            font-size: 0.88rem;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
        }
        thead th:first-child {
            background: #1a252f;
            min-width: 130px;
        }

        tbody tr:not(:last-child) td {
            border-bottom: 1px solid #e8eaed;
        }

        td {
            border-right: 1px solid #e8eaed;
            text-align: center;
            vertical-align: middle;
            padding: 0;
        }
        td:last-child { border-right: none; }

        /* Coluna de horário */
        .col-horario {
            background: #f7f8fa;
            padding: 10px 14px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #555;
            text-align: left;
            white-space: nowrap;
        }
        .col-horario .htpc-badge {
            display: inline-block;
            background: #f0a500;
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 5px;
            vertical-align: middle;
            letter-spacing: .4px;
        }
        .col-horario .opt-badge {
            display: block;
            font-size: 0.68rem;
            color: #999;
            font-weight: 400;
            margin-top: 2px;
        }

        /* Células com select */
        .cell {
            height: 64px;
            padding: 4px;
        }
        .cell select {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            outline: none;
            padding: 4px 2px;
            background: #fff;
            color: #aaa;
            transition: background 0.15s;
        }
        .cell select.role-ori {
            background: #d6eaff;
            color: #1a5fa8;
        }
        .cell select.role-prof {
            background: #d4f0e0;
            color: #1a7a45;
        }

        /* Célula desabilitada (HTPC – Sexta) */
        .cell-disabled {
            height: 64px;
            background: #f2f2f2;
            cursor: not-allowed;
        }
        .cell-disabled span {
            font-size: 0.72rem;
            color: #c0c0c0;
        }

        /* ── CARDS DE HORAS ──────────────────────────────────── */
        .cards {
            display: flex;
            gap: 16px;
            margin-top: 22px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 200px;
            background: #fff;
            border-radius: 10px;
            padding: 16px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
        }
        .card-title {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .6px;
            margin-bottom: 6px;
        }
        .card.azul .card-title  { color: #1a5fa8; }
        .card.verde .card-title { color: #1a7a45; }

        .card-horas {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 2px;
        }
        .card.azul .card-horas  { color: #1a5fa8; }
        .card.verde .card-horas { color: #1a7a45; }

        .card-meta {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 10px;
        }

        .bar-bg {
            height: 8px;
            background: #eee;
            border-radius: 99px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 99px;
            transition: width .35s ease;
        }
        .card.azul  .bar-fill { background: #4a90d9; }
        .card.verde .bar-fill { background: #3dae6a; }

        .card-status {
            font-size: 0.75rem;
            margin-top: 6px;
            font-weight: 600;
        }
        .ok        { color: #1a7a45; }
        .falta     { color: #c0392b; }
        .excedente { color: #e67e00; }

        /* Card total */
        .card.total .card-title { color: #5a3ea8; }
        .card.total .card-horas { color: #5a3ea8; }
        .card.total .bar-fill   { background: #7c5cbf; }
        .card-excedente {
            font-size: 0.75rem;
            margin-top: 4px;
            font-weight: 600;
            color: #e67e00;
        }
    </style>
</head>
<body>

<h1>Organizador de Horários</h1>

<!-- Legenda -->
<div class="legenda">
    <div class="legenda-item">
        <div class="legenda-cor azul"></div>
        <span>Orientadora Educacional</span>
    </div>
    <div class="legenda-item">
        <div class="legenda-cor verde"></div>
        <span>Professora</span>
    </div>
    <div class="legenda-item">
        <div class="legenda-cor vazio"></div>
        <span>Não atribuído</span>
    </div>
    <span class="legenda-info">Clique nas células para alternar entre os estados</span>
</div>

<!-- Tabela -->
<div class="table-wrap">
    <table id="tabela">
        <thead>
            <tr id="header-row"></tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<!-- Cards de horas -->
<div class="cards">
    <div class="card azul">
        <div class="card-title">Orientadora Educacional</div>
        <div class="card-horas" id="h-orientadora">0:00</div>
        <div class="card-meta">Meta: 20:00 h/semana</div>
        <div class="bar-bg"><div class="bar-fill" id="bar-orientadora" style="width:0%"></div></div>
        <div class="card-status" id="status-orientadora"></div>
    </div>
    <div class="card verde">
        <div class="card-title">Professora</div>
        <div class="card-horas" id="h-professora">0:00</div>
        <div class="card-meta">Meta: 22:30 h/semana</div>
        <div class="bar-bg"><div class="bar-fill" id="bar-professora" style="width:0%"></div></div>
        <div class="card-status" id="status-professora"></div>
    </div>
    <div class="card total">
        <div class="card-title">Total Geral</div>
        <div class="card-horas" id="h-total">0:00</div>
        <div class="card-meta">Meta: 42:30 h/semana</div>
        <div class="bar-bg"><div class="bar-fill" id="bar-total" style="width:0%"></div></div>
        <div class="card-status" id="status-total"></div>
        <div class="card-excedente" id="excedente-total"></div>
    </div>
</div>

<script>
const DAYS  = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta'];
const SLOTS = [
    { label: '07:30 – 11:30', hours: 4.0,  htpc: false },
    { label: '12:00 – 17:00', hours: 5.0,  htpc: false },
    { label: '17:00 – 19:30', hours: 2.5,  htpc: true  },
];

// Opções: role 'ori' = orientadora (azul), 'prof' = professora (verde), null = vazio
const OPTIONS = [
    { label: '—',             role: null   },
    // Professora
    { label: 'Juventino',      role: 'prof' },
    { label: 'HTPC',           role: 'prof' },
    { label: 'Planej Casa',    role: 'prof' },
    // Orientadora
    { label: 'JUVENTINO',      role: 'ori'  },
    { label: 'ELEA TATAGIBA',  role: 'ori'  },
    { label: 'CHRISTOS',       role: 'ori'  },
    { label: 'ANNA BENEDICTA', role: 'ori'  },
];

const META_ORI   = 20.0;
const META_PROF  = 22.5;
const META_TOTAL = 42.5;

let state = {};

function toHM(h) {
    const hrs  = Math.floor(h);
    const mins = Math.round((h - hrs) * 60);
    return `${hrs}:${String(mins).padStart(2, '0')}`;
}

function isDisabled(si, di) {
    return SLOTS[si].htpc && di === 4;
}

function key(s, d) { return `${s}-${d}`; }

function buildTable() {
    const hr = document.getElementById('header-row');
    hr.innerHTML = '<th>Horário</th>';
    DAYS.forEach(d => {
        const th = document.createElement('th');
        th.textContent = d;
        hr.appendChild(th);
    });

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    SLOTS.forEach((slot, si) => {
        const tr = document.createElement('tr');

        const tdLabel = document.createElement('td');
        tdLabel.className = 'col-horario';
        let inner = slot.label;
        if (slot.htpc) {
            inner += ' <span class="htpc-badge">HTPC</span>';
            inner += '<span class="opt-badge">Opcional · Seg – Qui</span>';
        }
        tdLabel.innerHTML = inner;
        tr.appendChild(tdLabel);

        DAYS.forEach((_, di) => {
            const td = document.createElement('td');
            if (isDisabled(si, di)) {
                td.className = 'cell-disabled';
                td.innerHTML = '<span>—</span>';
            } else {
                td.className = 'cell';
                td.id = `c-${si}-${di}`;

                const sel = document.createElement('select');
                sel.id = `s-${si}-${di}`;

                // Grupo vazio
                const optEmpty = document.createElement('option');
                optEmpty.value = '';
                optEmpty.textContent = '—';
                sel.appendChild(optEmpty);

                // Grupo Professora
                const grpProf = document.createElement('optgroup');
                grpProf.label = 'Professora';
                OPTIONS.filter(o => o.role === 'prof').forEach(o => {
                    const opt = document.createElement('option');
                    opt.value = o.label;
                    opt.textContent = o.label;
                    grpProf.appendChild(opt);
                });
                sel.appendChild(grpProf);

                // Grupo Orientadora
                const grpOri = document.createElement('optgroup');
                grpOri.label = 'Orientadora';
                OPTIONS.filter(o => o.role === 'ori').forEach(o => {
                    const opt = document.createElement('option');
                    opt.value = o.label;
                    opt.textContent = o.label;
                    grpOri.appendChild(opt);
                });
                sel.appendChild(grpOri);

                sel.addEventListener('change', () => {
                    state[key(si, di)] = sel.value;
                    applySelectStyle(sel);
                    updateCards();
                    saveState();
                });

                td.appendChild(sel);
            }
            tr.appendChild(td);
        });

        tbody.appendChild(tr);
    });
}

function applySelectStyle(sel) {
    const val = sel.value;
    const opt = OPTIONS.find(o => o.label === val);
    const role = opt ? opt.role : null;
    sel.className = role ? `role-${role}` : '';
}

function renderCell(si, di) {
    const sel = document.getElementById(`s-${si}-${di}`);
    if (!sel) return;
    sel.value = state[key(si, di)] || '';
    applySelectStyle(sel);
}

function updateCards() {
    let ori = 0, prof = 0;
    SLOTS.forEach((slot, si) => {
        DAYS.forEach((_, di) => {
            if (isDisabled(si, di)) return;
            const val = state[key(si, di)] || '';
            const opt = OPTIONS.find(o => o.label === val);
            if (!opt || !opt.role) return;
            if (opt.role === 'ori')  ori  += slot.hours;
            if (opt.role === 'prof') prof += slot.hours;
        });
    });

    document.getElementById('h-orientadora').textContent   = toHM(ori);
    document.getElementById('bar-orientadora').style.width = Math.min(ori / META_ORI * 100, 100) + '%';
    const statusOri = document.getElementById('status-orientadora');
    if (ori >= META_ORI) {
        statusOri.textContent = '✔ Meta atingida';
        statusOri.className = 'card-status ok';
    } else {
        statusOri.textContent = `Faltam ${toHM(META_ORI - ori)}`;
        statusOri.className = 'card-status falta';
    }

    document.getElementById('h-professora').textContent   = toHM(prof);
    document.getElementById('bar-professora').style.width = Math.min(prof / META_PROF * 100, 100) + '%';
    const statusProf = document.getElementById('status-professora');
    if (prof >= META_PROF) {
        statusProf.textContent = '✔ Meta atingida';
        statusProf.className = 'card-status ok';
    } else {
        statusProf.textContent = `Faltam ${toHM(META_PROF - prof)}`;
        statusProf.className = 'card-status falta';
    }

    const total = ori + prof;
    document.getElementById('h-total').textContent   = toHM(total);
    document.getElementById('bar-total').style.width = Math.min(total / META_TOTAL * 100, 100) + '%';
    const statusTotal    = document.getElementById('status-total');
    const excedenteTotal = document.getElementById('excedente-total');
    if (total >= META_TOTAL) {
        statusTotal.textContent = '✔ Meta atingida';
        statusTotal.className   = 'card-status ok';
        const excesso = total - META_TOTAL;
        excedenteTotal.textContent = excesso > 0 ? `⚠ Excedente: ${toHM(excesso)}` : '';
    } else {
        statusTotal.textContent = `Faltam ${toHM(META_TOTAL - total)}`;
        statusTotal.className   = 'card-status falta';
        excedenteTotal.textContent = '';
    }
}

function saveState() {
    fetch('/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state)
    });
}

async function loadState() {
    try {
        const res = await fetch('/load');
        if (res.ok) {
            state = await res.json();
            SLOTS.forEach((_, si) => DAYS.forEach((_, di) => {
                if (!isDisabled(si, di)) renderCell(si, di);
            }));
            updateCards();
        }
    } catch(e) {}
}

buildTable();
loadState();
</script>
</body>
</html>
